    points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="#2A2B2A"
  />
  <!-- Inner ring -->
  <polygon
    points="32,14 48,23 48,41 32,50 16,41 16,23"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="1.5"
    stroke-opacity="0.3"
