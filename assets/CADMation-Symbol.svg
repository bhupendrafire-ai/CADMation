  <!-- Tick marks -->
  <line x1="32" y1="6" x2="32" y2="11" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="54" y1="18" x2="50" y2="21" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="54" y1="46" x2="50" y2="43" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="32" y1="58" x2="32" y2="53" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="10" y1="46" x2="14" y2="43" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="10" y1="18" x2="14" y2="21" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
</svg>
