<svg xmlns/http://www.w3.org/2000/svg' viewBox='0 0 160 200' width='160' height='200'>
  <defs>
    <style>
      .txt { font-family: 'Roboto Flex', 'Roboto', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- ========== SYMBOL ========== -->
  <g id='symbol' transform='translate(80, 70)'>
    <!-- Hexagon outer frame -->
    <polygon
      points='0,-48 41.57,-24 41.57,24 0,48 -41.57,24 -41.57,-24'
      fill='none'
      stroke='#2A2B2A'
      stroke-width='5'
      stroke-linejoin='round'
    />
    <!-- Inner precision ring -->
    <polygon
      points='0,-30 26.0,-15 26.0,15 0,30 -26.0,15 -26.0,-15'
      fill='#2A2B2A'
      fill-opacity='0.08'
      stroke='#2A2B2A'
      stroke-width='2'
      stroke-linejoin='round'
    />
    <!-- Stylized C arc -->
    <path
      d='M 16,-19 A 22,22 0 1,0 16,19'
      fill='none'
      stroke='#E63F26'
      stroke-width='6'
      stroke-linecap='round'
    />
    <!-- C apex dot -->
    <circle cx='18' cy='0' r='4.5' fill='#E63F26' />
    <!-- Radial tick marks -->
    <line x1='0' y1='-41' x2='0' y2='-35' stroke='#2A2B2A' stroke-width='2.5' stroke-linecap='round'/>
    <line x1='35.5' y1='-20.5' x2='31.6' y2='-18.2' stroke='#2A2B2A' stroke-width='2.5' stroke-linecap='round'/>
    <line x1='35.5' y1='20.5' x2='31.6' y2='18.2' stroke='#2A2B2A' stroke-width='2.5' stroke-linecap='round'/>
    <line x1='0' y1='41' x2='0' y2='35' stroke='#2A2B2A' stroke-width='2.5' stroke-linecap='round'/>
    <line x1='-35.5' y1='20.5' x2='-31.6' y2='18.2' stroke='#2A2B2A' stroke-width='2.5' stroke-linecap='round'/>
    <line x1='-35.5' y1='-20.5' x2='-31.6' y2='-18.2' stroke='#2A2B2A' stroke-width='2.5' stroke-linecap='round'/>
  </g>

  <!-- ========== WORDMARK ========== -->
  <!-- CAD -->
  <text x='80' y='145'
    text-anchor='middle'
    font-family='Roboto Flex, Roboto, system-ui, sans-serif'
    font-weight='900'
    font-size='42'
    fill='#2A2B2A'
    letter-spacing='-1'>CAD</text>
  <!-- Mation label -->
  <text x='80' y='168'
    text-anchor='middle'
    font-family='Roboto Flex, Roboto, system-ui, sans-serif'
    font-weight='400'
    font-size='18'
    fill='#6B6B6B'
    letter-spacing='2.5'>MATION</text>
  <!-- Accent underline -->
  <rect x='32' y='152' width='96' height='4' fill='#E63F26' rx='2'/>
</svg>